# Profile runtime template — minimal runtime defaults for profiling.
# The profiler overrides all parallelism, model, batch, and profile flags via CLI.
# This file only provides sensible defaults for fields NOT touched by the profiler.

runtime:
  parallel:
    pp_deg: 1
    global_tp_deg: 1
    global_tp_consec: 1
    global_cp_deg: 1
    global_ep_deg: 1
    global_tp_of_ep_deg: 1
    global_checkpoint: 0
    cp_mode: zigzag
    sdp: 0
    default_dp_type: ddp
    pipeline_type: gpipe
    galvatron_config_path: null
    vocab_sdp: 0
    vocab_tp: 1
    vocab_cp: 1
    async_grad_reduce: false
    mixed_precision: bf16
    use_ulysses: false
    reduce_in_fp32: false
    entropy_in_fp32: false

  model:
    model_size: null
    model_config_path: null
    is_moe_model: false
    set_experts_manually: 0
    set_model_config_manually: 0
    set_layernum_manually: 1
    set_seqlen_manually: 1
    num_layers: null
    initialize_on_meta: 0
    shape_order: SBH
    dropout_prob: 0.0
    print_loss: 0

  profile:
    profile: 1
    profile_mode: static
    profile_unit: all
    profile_forward: 0
    save_profiled_memory: 0
    exit_after_profiling: 1

  train:
    train_iters: 20
    eval_iters: 1
    lr: 6.0e-4
    min_lr: 6.0e-5
    lr_decay_style: cosine
    lr_warmup_fraction: 0.1
    weight_decay: 0.1
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    init_method_std: 0.02
    sequence_parallel: true
    use_flash_attn: true
    global_batch_size: 32
    micro_batch_size: 1
    chunks: 8
    seq_length: 4096
    clip_grad: 1.0

  data:
    tokenizer_type: HuggingFaceTokenizer
    tokenizer_model: /home/pkuhetu/lxy/checkpoints/llama2-7b-chat-hf
    use_random_dataset: true

  ckpt:
    load: null
    load_iteration: 0
    distributed_checkpoint: false
    save: null
    save_interval: null
