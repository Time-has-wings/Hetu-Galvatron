NUM_NODES: 1
NUM_GPUS_PER_NODE: 8
MEMORY_CONSTRAINT: 36

SEQ_LENGTH: 2048
LOG_DIR: ./logs/search_engine

search_engine:
  profiling_info:
    time_profile_mode: batch
    memory_profile_mode: static

  model_info:
    model_config_path: ../model_configs/llama2-7b.yaml
    model_size: llama2-7b
    is_moe_model: false
    set_model_config_manually: 0
    set_layernum_manually: 1
    set_seqlen_manually: 1
    num_layers: 32

  common_train_info:
    seq_length: ${SEQ_LENGTH}
    sequence_parallel: true
    global_memory_buffer: true

  parallelism_info:
    default_dp_type: zero2
    pipeline_type: pipedream_flush
    async_grad_reduce: true
    mixed_precision: bf16

  hardware_info:
    num_nodes: ${NUM_NODES}
    num_gpus_per_node: ${NUM_GPUS_PER_NODE}
    memory_constraint: ${MEMORY_CONSTRAINT}
  
  batch_size_info:
    min_bsz: 16
    max_bsz: 16
    bsz_scale: 1
    settle_bsz: -1
    recommend_min_bsz: 0

  search_space_info:
    disable_dp: 0
    disable_tp: 0
    disable_cp: 1
    disable_sp: 0
    disable_embedding_lmhead_tp: 0
    max_tp_deg: 8
    max_pp_deg: 8
    max_sp_deg: 8
    max_cp_deg: 8

  options_info:
    parallel_search: false
    worker: 0
    log_dir: ${LOG_DIR}
    fine_grained_mode: 1
    