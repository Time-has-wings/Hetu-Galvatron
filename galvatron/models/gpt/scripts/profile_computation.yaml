# batch mode
model_profiler:
  profile_type: computation
  profile_mode: batch
  profile_unit: all
  profile_flow_control: all
  profile_mixed_precision: bf16
  profile_min_batch_size: 1
  profile_max_batch_size: 12
  profile_batch_size_step: 1
  profile_fixed_seq_length_list: [2048]
  profile_layernum_min: 2
  profile_layernum_max: 4
  runtime_yaml_template_path: scripts/train_dist.yaml

  model_info:
    model_config_path: ../model_configs/llama2-7b.yaml
    model_size: llama2-7b
    is_moe_model: false


