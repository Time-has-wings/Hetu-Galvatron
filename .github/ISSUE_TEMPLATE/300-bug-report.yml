name: "Bug Report"
description: "Report a bug in Galvatron (incorrect behavior, crash, wrong result)"
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - "Profiler"
        - "Search Engine / Cost Model"
        - "Runtime / Pipeline Parallel"
        - "Runtime / Tensor Parallel"
        - "Runtime / Data Parallel (FSDP/DDP)"
        - "Runtime / MoE"
        - "Runtime / Checkpoint"
        - "Model (GPT)"
        - "Model (MoE)"
        - "Config / Arguments"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or script to reproduce the bug.
      placeholder: |
        1. Set config ...
        2. Run command ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include error messages, stack traces, or logs.
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Python version:
        - PyTorch version:
        - CUDA version:
        - GPU model & count:
        - Galvatron version / commit:
        - Number of nodes / GPUs per node:
      render: markdown
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Screenshots, config files, related issues, possible fix, etc.
    validations:
      required: false
