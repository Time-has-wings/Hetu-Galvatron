name: AI PR Summary

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to summarize (for testing on existing PRs)"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/prompts

      - name: Resolve PR number
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NUM=${{ inputs.pr_number }}
          else
            NUM=${{ github.event.pull_request.number }}
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      - name: Get PR diff and title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ steps.resolve.outputs.number }} \
            > /tmp/pr_diff.txt 2>/dev/null || true
          head -c 100000 /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt

          gh pr view ${{ steps.resolve.outputs.number }} \
            --json title --jq '.title' > /tmp/pr_title.txt

      - name: AI summary
        id: summary
        uses: actions/ai-inference@v1
        with:
          prompt-file: .github/prompts/pr-summary.prompt.yml
          file_input: |
            title: /tmp/pr_title.txt
            diff: /tmp/pr_diff_truncated.txt

      - name: Post or update summary comment
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.summary.outputs.response }}
          PR_NUM: ${{ steps.resolve.outputs.number }}
        with:
          script: |
            const summary = process.env.SUMMARY;
            if (!summary || summary.trim().length === 0) {
              console.log('Empty AI response, skipping comment.');
              return;
            }

            const prNumber = parseInt(process.env.PR_NUM, 10);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = '## AI Summary';
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: summary
              });
            }
