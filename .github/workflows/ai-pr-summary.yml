name: AI PR Summary

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/prompts

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            > /tmp/pr_diff.txt 2>/dev/null || true
          # Truncate to ~100KB to stay within model context limits
          head -c 100000 /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt

      - name: AI summary
        id: summary
        uses: actions/ai-inference@v1
        with:
          prompt-file: .github/prompts/pr-summary.prompt.yml
          input: |
            title: ${{ github.event.pull_request.title }}
          file_input: |
            diff: /tmp/pr_diff_truncated.txt

      - name: Post or update summary comment
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.summary.outputs.response }}
        with:
          script: |
            const summary = process.env.SUMMARY;
            if (!summary || summary.trim().length === 0) {
              console.log('Empty AI response, skipping comment.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## AI Summary';
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary
              });
            }
